# Reins production configuration — non-secret, environment-specific values.
# Secrets (API keys, tokens, passwords, DB URL) go in Fly secrets.
# Environment variables (including Fly secrets) always override values here.

server:
  port: 5001
  host: 0.0.0.0
  log_level: info

urls:
  dashboard_url: https://app.agenthelm.mom
  public_url: https://app.agenthelm.mom

oauth:
  google_redirect_uri: https://app.agenthelm.mom/api/oauth/google/callback
  google_login_redirect_uri: https://app.agenthelm.mom/api/auth/google/callback
  microsoft_redirect_uri: https://app.agenthelm.mom/api/oauth/microsoft/callback
  microsoft_tenant_id: common

fly:
  org: personal
  openclaw_app: reins-openclaw
  # OPENCLAW_IMAGE and HERMES_IMAGE are promoted automatically by the image-test
  # runner (applyPromotion in tests/image-test/lib/read-promoted.ts), which sets
  # them as Fly secrets on the backend app. Do not hardcode them here — the Fly
  # secret always wins and gets updated on every promotion.
  openclaw_image: ""
  hermes_image: ""

browser:
  max_instances: 5
  idle_timeout_ms: 300000

onboarding:
  bot_webhook_url: https://app.agenthelm.mom
  # The Telegram bot users message to confirm they want agent notifications.
  # Development uses the dev bot; production uses the official approvals bot.
  notify_bot_username: AgentHelmApprovalsBot
  # Skip BotFather step — use platform shared bot for the user's first agent.
  shared_bot_enabled: true
