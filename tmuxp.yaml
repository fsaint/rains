# Reins Development Environment
# Usage: tmuxp load tmuxp.yaml

session_name: reins
start_directory: ./

windows:
  - window_name: dev
    layout: main-vertical
    options:
      main-pane-width: 50%
    panes:
      - shell_command: npm run dev:backend
        focus: true
      - shell_command: sleep 2 && npm run dev:frontend

  - window_name: shell
    layout: even-horizontal
    panes:
      - shell_command: echo "Backend http://localhost:3000 | Frontend http://localhost:5173"
      - shell_command: echo "DB terminal - sqlite3 ./data/reins.db"

  - window_name: tests
    panes:
      - shell_command: echo "Run: npm test"

  - window_name: git
    panes:
      - shell_command: git status
