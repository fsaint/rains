# Reins Development Environment
# Usage: tmuxp load tmuxp.yaml

session_name: reins
start_directory: ./

windows:
  - window_name: dev
    layout: even-vertical
    panes:
      - shell_command: "npm run build --workspace=shared && npm run build --workspace=servers && npm run dev:backend"
        focus: true
      - shell_command: "sleep 4 && npm run dev:frontend"
      - shell_command: "sleep 4 && npm run dev:onboarding"
