session_name: reins-prod
start_directory: /Users/fsaint/git/reins

windows:
  - window_name: backend
    panes:
      - shell_command: |
          export $(grep -v '^#' .env | xargs)
          export REINS_PROVIDER=fly
          npm run dev:backend

  - window_name: frontend
    panes:
      - shell_command: |
          export $(grep -v '^#' .env | xargs)
          npm run dev:frontend

  - window_name: fly
    layout: even-horizontal
    panes:
      - shell_command: |
          echo "=== Fly machines ==="
          watch -n10 fly machines list --app agentx-openclaw
      - shell_command: |
          echo "=== Fly logs (set APP= to filter) ==="
          echo "Usage: fly logs --app <app-name>"
          bash

  - window_name: db
    panes:
      - shell_command: |
          export $(grep -v '^#' .env | xargs)
          psql $DATABASE_URL
