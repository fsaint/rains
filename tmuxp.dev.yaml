session_name: reins-dev
start_directory: /Users/fsaint/git/reins

windows:
  - window_name: backend
    panes:
      - shell_command: |
          export $(grep -v '^#' .env | xargs)
          export REINS_PROVIDER=local
          npm run dev:backend

  - window_name: frontend
    panes:
      - shell_command: |
          export $(grep -v '^#' .env | xargs)
          npm run dev:frontend

  - window_name: docker
    layout: even-horizontal
    panes:
      - shell_command: |
          echo "=== Docker agent containers ==="
          watch -n5 docker ps --filter label=reins-agent --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
      - shell_command: |
          echo "=== Docker agent logs (attach to a container) ==="
          echo "Usage: docker logs -f <container-name>"
          bash

  - window_name: db
    panes:
      - shell_command: |
          export $(grep -v '^#' .env | xargs)
          psql $DATABASE_URL
