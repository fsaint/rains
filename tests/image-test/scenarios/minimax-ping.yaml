name: minimax-ping
description: Smoke test for MiniMax agents — uses longer timeout to accommodate thinking preamble before actual answer
timeout_seconds: 180
prompt: |
  What is 7 plus 8? Reply with ONLY the number, nothing else.
assertions:
  - type: reply_contains
    value: "15"
  - type: reply_not_contains
    values: ["error", "sorry", "cannot"]
