name: opentable-search
description: Search OpenTable for a restaurant
timeout_seconds: 180
prompt: |
  Go to opentable.com and search for Italian restaurants in the Marina
  district of San Francisco for 4 people at 6pm tonight. Tell me the
  name of the first restaurant result and take a screenshot.
assertions:
  - type: reply_contains_any
    values: ["restaurant", "Italian", "Marina"]
  - type: reply_not_contains
    values: ["error", "cannot", "unable to"]
  - type: screenshot_present
  - type: reply_min_length
    value: 50
