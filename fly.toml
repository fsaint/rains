app = "agenthelm-core"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  REINS_PORT = "5001"
  REINS_HOST = "0.0.0.0"

[http_service]
  internal_port = 5001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1

[[vm]]
  size = "shared-cpu-2x"
  memory = "512mb"
