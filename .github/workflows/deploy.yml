name: Deploy to Production

on:
  push:
    branches: [main]

# Only one deploy runs at a time; newer pushes cancel the in-flight one.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy agenthelm-core + agenthelm-onboarding
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy agenthelm-core (backend + frontend)
        run: fly deploy --app agenthelm-core --dockerfile Dockerfile --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy agenthelm-onboarding (Telegram onboarding bot)
        run: fly deploy --app agenthelm-onboarding --config onboarding/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
